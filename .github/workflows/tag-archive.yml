name: Create Archive for Tag

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - 'dual-check-2fa-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  create-archive:
    runs-on: ubuntu-latest

    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create archive
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="dual-check-2fa.zip"
          
          # Create archive with specified directories and file
          zip -r "${ARCHIVE_NAME}" \
            includes/\
            templates/\
            vendor/\
            dual-check-2fa.php\
            uninstall.php\
            LICENSE\
            composer.json\
            SECURITY.md\
            readme.txt
      
      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: dual-check-2fa-archive
          path: dual-check-2fa-*.zip
          retention-days: 90

      - name: Create release if it doesn't exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          if ! gh release view "$TAG_NAME"; then
            gh release create "$TAG_NAME" --title="$TAG_NAME" --notes="Automated release for $TAG_NAME"
          fi

      - name: Attach archive to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="dual-check-2fa-${TAG_NAME}.zip"
          
          echo "=== Attaching ${ARCHIVE_NAME} to release ${TAG_NAME} ==="
          gh release upload "${TAG_NAME}" "${ARCHIVE_NAME}" --clobber